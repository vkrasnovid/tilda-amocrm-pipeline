services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - pipeline-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - pipeline-net
    volumes:
      - sqlite-data:/data
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build: .
    restart: unless-stopped
    networks:
      - pipeline-net
    volumes:
      - sqlite-data:/data
    env_file:
      - .env
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=default,email,amocrm,telegram
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    stop_grace_period: 60s

  beat:
    build: .
    restart: unless-stopped
    networks:
      - pipeline-net
    volumes:
      - sqlite-data:/data
    env_file:
      - .env
    command: >
      celery -A app.celery_app beat
      --loglevel=info
      --scheduler=celery.beat:PersistentScheduler
      --schedule=/data/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

networks:
  pipeline-net:
    driver: bridge

volumes:
  sqlite-data:
  redis-data:
